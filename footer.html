<style>
  :root {
    --site--width: 89.5rem;
    --site--column-count: 12;
    --site--gutter: 2rem;
    --site--margin: clamp(2rem, 1.0816326530612246rem + 3.9183673469387754vw, 5rem);
    --site--max-width: min(var(--site--width), 100vw);
    --container--main: calc(var(--site--max-width) - var(--site--margin) * 2);
  }
  .site-footer {
    background: #0a0a0a;
    border-top: 1px solid rgba(240, 239, 233, 0.08);
    color: #f0efe9;
    padding: clamp(3rem, 6vw, 6rem) 0;
    -webkit-font-smoothing: antialiased;
  }
  .site-footer__inner {
    width: calc(100% - (var(--site--margin) * 2));
    max-width: var(--container--main);
    margin: 0 auto;
    display: grid;
    gap: 2.5rem;
    box-sizing: border-box;
  }
  @media (min-width: 900px) {
    .site-footer__inner {
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr);
      align-items: start;
    }
  }
  .site-footer__brand {
    display: grid;
    gap: 1rem;
    max-width: 34rem;
  }
  .site-footer__logo {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #f0efe9;
    text-decoration: none;
  }
  .site-footer__copy {
    margin: 0;
    color: #9a9992;
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 32ch;
    overflow-wrap: anywhere;
  }
  .site-footer__meta {
    margin: 0;
    color: #9a9992;
    font-size: 0.82rem;
    line-height: 1.6;
    overflow-wrap: anywhere;
  }
  .site-footer__groups {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1.5rem 2rem;
  }
  @media (max-width: 720px) {
    .site-footer__groups {
      grid-template-columns: 1fr;
    }
  }
  .site-footer__group {
    display: grid;
    gap: 0.9rem;
    align-content: start;
  }
  .site-footer__title {
    margin: 0;
    font-family: "Manrope", system-ui, -apple-system, sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: 0;
    text-transform: none;
    color: #f0efe9;
  }
  .site-footer__list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 0.75rem;
  }
  .site-footer__link {
    color: rgba(240, 239, 233, 0.72);
    text-decoration: none;
    transition: color 0.2s ease;
    font-size: 0.95rem;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }
  .site-footer__link:hover,
  .site-footer__link:focus-visible {
    color: #f0efe9;
  }
  @media (max-width: 479px) {
    .site-footer {
      padding: 2.5rem 0;
    }
    .site-footer__inner {
      width: calc(100% - 2rem);
      gap: 2rem;
    }
  }
</style>
